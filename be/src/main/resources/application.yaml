# Bí mật (DB, JWT, OAuth, Cloudinary, …) không ghi trực tiếp vào repo — đặt qua biến môi trường.
# ===================================================================
# 1. CẤU HÌNH SERVER & ỨNG DỤNG
# ===================================================================
server:
  port: 8080                              # Cổng chạy ứng dụng backend
  servlet:
    context-path: /api/v1                 # Tiền tố chung cho toàn bộ API (VD: http://localhost:8080/api/v1/users)

spring:
  application:
    name: fcar-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  profiles:
    active: dev                           # Profile đang chạy (dev, prod, test). Giúp dễ dàng tách file cấu hình sau này.

  # ===================================================================
  # 2. CẤU HÌNH DATABASE (MySQL)
  # ===================================================================
  datasource:
    # SPRING_DATASOURCE_* (Spring Boot map tự động từ biến môi trường)
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fcar_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

    # Tối ưu hóa Connection Pool (HikariCP)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # ===================================================================
  # 3. CẤU HÌNH FLYWAY (Quản lý phiên bản Database)
  # ===================================================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===================================================================
  # 4. CẤU HÌNH JPA & HIBERNATE (Giao tiếp với Database)
  # ===================================================================
  jpa:
    hibernate:
      ddl-auto: none                # Validate code Java với Database, không tự tạo bảng
    show-sql: true
    open-in-view: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        highlight_sql: true

  # ===================================================================
  # 5. CẤU HÌNH OAUTH2 (ĐĂNG NHẬP GOOGLE/FACEBOOK)
  # Đã được gom vào đúng phân cấp của nhánh "spring"
  # ===================================================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code # Đảm bảo sử dụng kiến trúc Authorization Code
        provider:
          google:
            user-name-attribute: email

# ===================================================================
# 6. CẤU HÌNH BẢO MẬT & JWT TOKEN (Tự định nghĩa)
# ===================================================================
app:
  jwt:
    # Bắt buộc set JWT_SECRET (chuỗi hex/base64 đủ dài, ví dụ >= 256 bit)
    secret: ${JWT_SECRET}
    expiration-ms: 3600000 # Access token ~1 giờ
    refresh-expiration-ms: 604800000 # Refresh token ~7 ngày
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME} 
    api-key: ${CLOUDINARY_API_KEY} 
    api-secret: ${CLOUDINARY_API_SECRET} 
    folder: ${CLOUDINARY_FOLDER:fcar}
  # Tài khoản admin khởi tạo lần đầu (AdminUserBootstrap). Đăng nhập bằng email + mật khẩu.
  security:
    bootstrap-admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@fcar.local}
    bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:admin}

# ===================================================================
# 6. CẤU HÌNH SWAGGER (Tài liệu API tự động)
# ===================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha